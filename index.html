
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Maosh Hisoblagich PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0b1020;
  --bg2:#111827;
  --card:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.12);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --primary:#8b5cf6;
  --primary2:#06b6d4;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  color:var(--text);
  padding:12px;
}
.app{
  max-width:520px;
  margin:auto;
}
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter: blur(16px);
  border-radius:22px;
  padding:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.45);
}
.title{
  text-align:center;
  font-size:20px;
  font-weight:700;
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.subtitle{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin-bottom:12px;
}
input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,0.05);
  color:var(--text);
  outline:none;
  font-size:14px;
}
input:focus{
  border-color:var(--primary2);
  box-shadow:0 0 12px rgba(6,182,212,0.35);
}
button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  font-size:14px;
}
.btn-primary{
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:white;
}
.btn-danger{
  background:var(--danger);
  color:white;
}
.table{
  margin-top:12px;
  overflow-x:auto;
  border-radius:12px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:360px;
}
th,td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
th{
  color:var(--muted);
}
.total{
  margin-top:10px;
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:#22d3ee;
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(139,92,246,0.15);
  color:#c4b5fd;
  font-size:11px;
  margin-bottom:10px;
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="title">💰 Maosh Hisoblagich PRO</div>
    <div class="subtitle">Kunlik ish + kelgan kun asosida hisoblaydi</div>
    <div class="badge">Mobile Optimized</div>

    <input type="number" id="daily" placeholder="Kunlik maosh (masalan 67000)" />
    <input type="number" id="days" placeholder="Ishga kelgan kunlar soni" />

    <button class="btn-primary" onclick="add()">➕ Hisoblash</button>
    <button class="btn-danger" onclick="clearAll()">🗑 Tozalash</button>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Kunlik</th>
            <th>Keldi</th>
            <th>Jami</th>
            <th>❌</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <div class="total">Jami to‘lov: <span id="total">0</span> so‘m</div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('data')||'[]');
render();

function calc(daily, days){
  return daily * days;
}

function add(){
  let daily = +document.getElementById('daily').value;
  let days = +document.getElementById('days').value;

  if(!daily || !days){
    alert("Ma'lumot kiriting!");
    return;
  }

  data.push({daily,days});
  save();
  render();

  document.getElementById('daily').value='';
  document.getElementById('days').value='';
}

function remove(i){
  data.splice(i,1);
  save();
  render();
}

function render(){
  let list=document.getElementById('list');
  list.innerHTML='';
  let total=0;

  data.forEach((d,i)=>{
    let sum = calc(d.daily,d.days);
    total += sum;

    list.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${d.daily}</td>
        <td>${d.days}</td>
        <td><b>${sum}</b></td>
        <td><button onclick="remove(${i})">❌</button></td>
      </tr>`;
  });

  document.getElementById('total').innerText = total;
}

function save(){
  localStorage.setItem('data',JSON.stringify(data));
}

function clearAll(){
  if(confirm("Hammasini o‘chirasizmi?")){
    data=[];
    save();
    render();
  }
}
</script>
</body>
</html>
