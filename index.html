<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Maosh Hisoblagich PRO Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0f172a;
  --bg2:#1e1b4b;
  --card:rgba(255,255,255,0.08);
  --stroke:rgba(255,255,255,0.12);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --primary:#7c3aed;
  --primary2:#06b6d4;
  --danger:#ef4444;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #1e1b4b, #0f172a);
  color:var(--text);
  padding:12px;
}
.app{
  max-width:520px;
  margin:auto;
}
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  backdrop-filter: blur(14px);
  border-radius:20px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.title{
  text-align:center;
  font-size:20px;
  font-weight:700;
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}
input{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:14px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,0.05);
  color:var(--text);
  outline:none;
}
input::placeholder{color:var(--muted)}
input:focus{
  border-color:var(--primary2);
  box-shadow:0 0 10px rgba(6,182,212,0.4);
}
button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
}
.btn-primary{
  background:linear-gradient(90deg,var(--primary),var(--primary2));
  color:white;
}
.btn-danger{
  background:var(--danger);
  color:white;
}
.table{
  margin-top:12px;
  overflow-x:auto;
  border-radius:12px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  min-width:450px;
}
th,td{
  padding:8px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
th{
  color:var(--muted);
  font-weight:600;
}
.total{
  margin-top:10px;
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:#22d3ee;
}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(124,58,237,0.2);
  color:#c4b5fd;
  font-size:11px;
  margin-bottom:10px;
}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="title">💰 Maosh Hisoblagich PRO ULTRA</div>
    <div class="badge">Modern Dashboard</div>

    <input type="text" id="name" placeholder="Ishchi ismi" />
    <input type="number" id="daily" placeholder="Kunlik maosh (67000)" />
    <input type="number" id="days" placeholder="Ish kunlari (30)" />
    <input type="number" id="absent" placeholder="Kelmagan kunlar" />

    <button class="btn-primary" onclick="addWorker()">➕ Qo‘shish</button>
    <button class="btn-danger" onclick="clearAll()">🗑 Tozalash</button>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Ism</th>
            <th>Kunlik</th>
            <th>Ish</th>
            <th>Kelmagan</th>
            <th>Jami</th>
            <th>❌</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <div class="total">Jami to‘lov: <span id="total">0</span> so‘m</div>
  </div>
</div>

<script>
let workers = JSON.parse(localStorage.getItem('workers')||'[]');
render();

function calc(daily, days, absent){
  let worked = Math.max(0, days - absent);
  return daily * worked;
}

function addWorker(){
  let name = document.getElementById('name').value.trim();
  let daily = +document.getElementById('daily').value;
  let days = +document.getElementById('days').value;
  let absent = +document.getElementById('absent').value;

  if(!name || !daily || !days || absent===null){
    alert("Ma'lumotlarni to‘liq kiriting!");
    return;
  }

  workers.push({name,daily,days,absent});
  save();
  render();

  document.getElementById('name').value='';
  document.getElementById('daily').value='';
  document.getElementById('days').value='';
  document.getElementById('absent').value='';
}

function removeWorker(i){
  workers.splice(i,1);
  save();
  render();
}

function render(){
  let list=document.getElementById('list');
  list.innerHTML='';
  let total=0;

  workers.forEach((w,i)=>{
    let final=calc(w.daily,w.days,w.absent);
    total+=final;

    list.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${w.name}</td>
        <td>${w.daily}</td>
        <td>${w.days}</td>
        <td>${w.absent}</td>
        <td><b>${final}</b></td>
        <td><button onclick="removeWorker(${i})">❌</button></td>
      </tr>`;
  });

  document.getElementById('total').innerText=total;
}

function save(){
  localStorage.setItem('workers',JSON.stringify(workers));
}

function clearAll(){
  if(confirm("Hammasini o‘chirasizmi?")){
    workers=[];
    save();
    render();
  }
}
</script>
</body>
</html>
